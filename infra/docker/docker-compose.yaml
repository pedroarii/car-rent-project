version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: car-rent-postgres
    environment:
      POSTGRES_DB: carrent
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: car-rent-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
